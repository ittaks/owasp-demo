# =========================================================================
# GLAVNA PRODUKCIJSKA KONFIGURACIJA (Zadane postavke - Hardened po defaultu)
# =========================================================================
server:
  port: 8080

spring:
  application:
    name: owasp-demo
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # Isključeno u produkciji kako se ne bi logirali osjetljivi podaci
  h2:
    console:
      enabled: false # OWASP Scenario #1: Razvojni alati su strogo ugašeni u produkciji
      path: /h2-console
  web:
    error:
      whitelabel:
        enabled: false
      include-stacktrace: never
      include-binding-errors: never
      include-message: never
# =========================================================================
# [DODANO ZA OWASP A02] - SIGURNA KONFIGURACIJA ACTUATOR ENDPOINTA
# =========================================================================
management:
  endpoints:
    web:
      exposure:
        # Eksplicitno izlažemo SAMO 'health' endpoint (siguran, javan za monitoring).
        # Osjetljivi endpointi poput 'env', 'beans', 'heapdump' su onemogućeni (Smanjenje napadačke površine).
        include: "health"
  endpoint:
    health:
      # Isključujemo detaljne informacije u produkciji (npr. verzije baze podataka, detalje o disku)
      # kako bismo spriječili curenje informacija (Information Disclosure).
      show-details: never
logging:
  level:
    root: INFO # U produkciji se koristi restriktivniji nivo logiranja (manji rizik od curenja podataka)

# OWASP A02: Eksternalizacija tajni izvan koda (povlačenje iz okruženja s fallback vrijednostima)
jwt:
  secret: ${JWT_SECRET:MojaUltraSigurnaTajnaKojaImaViseOdTridesetIdvaZnaka123!Totalnojakoskrozzzz;OUDVH\S;OFVUHS}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://trusted-frontend.demo.com}
# OWASP A04 & A02: Definiranje tajni izvan koda.
# Za produkciju se APP_CRYPTO_KEY prosljeđuje kao varijabla okruženja.
# Zamjenska (fallback) vrijednost ima točno 32 ASCII znaka (256 bita), što zadovoljava uvjete za AES-256 enkripciju.
  crypto:
    secret-key: ${APP_CRYPTO_KEY:MojaUltraSigurnaEnkripcijskaTajn}
---
# =========================================================================
# RAZVOJNA KONFIGURACIJA (Aktivira se isključivo pokretanjem uz profil "dev")
# =========================================================================
spring:
  config:
    activate:
      on-profile: dev
  h2:
    console:
      enabled: true # H2 konzola se dopušta isključivo u lokalnom razvoju

logging:
  level:
    root: DEBUG # Detaljno logiranje je dopušteno samo developerima u dev okruženju