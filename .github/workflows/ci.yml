name: OWASP Secure CI Pipeline

permissions:
  contents: read
  security-events: write

on:
  push:
    branches:
      - master
      - develop

  pull_request:
    branches:
      - master

jobs:
  secure-build:
    name: Build, SAST, SCA, SBOM and Container Scan
    runs-on: ubuntu-latest

    steps:

      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          queries: security-extended,security-and-quality

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scanners: vuln,misconfig
          format: table
          exit-code: 1

      - name: Maven Build + Tests + Dependency Check + SBOM
        run: mvn clean package

      - name: Debug target folder
        run: find target -type f

      - name: Upload CycloneDX SBOM
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: software-bill-of-materials
          path: |
            target/bom.json
            target/bom.xml
          retention-days: 30

      - name: Build Docker Image
        run: docker build -t owasp-demo:latest .

      - name: Trivy Docker Image Scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: owasp-demo:latest
          severity: HIGH,CRITICAL
          format: table
          exit-code: 1

      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v4