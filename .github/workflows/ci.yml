name: OWASP Secure CI Pipeline

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  secure-build:
    name: Izgradnja projekta, SCA Skeniranje i Verifikacija Dizajna (OWASP A03 & A06)
    runs-on: ubuntu-latest

    steps:
      # 1. Korak: Preuzimanje izvornog koda iz repozitorija
      - name: Preuzimanje koda
        uses: actions/checkout@v4

      # 2. Korak: Postavljanje Java 21 okruženja (JDK) potrebnog za prevođenje koda
      - name: Postavljanje Jave 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # =========================================================================
      # OWASP A06 ZAŠTITA: AUTOMATIZIRANO SKENIRANJE SIGURNOSNOG DIZAJNA (SAST)
      # =========================================================================
      # Koristimo Semgrep/SonarQube/Trivy (ovdje Trivy kao laganu i moćnu opciju)
      # kako bismo u ranom stadiju otkrili strukturne i dizajnerske propuste u kodu
      # (CWE-269, CWE-501, loše upravljanje povjerljivim podacima).
      - name: Statika analiza dizajna i koda (SAST - OWASP A06)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          security-checks: 'vuln,config'
          format: 'table'
          exit-code: '1' # Cjevovod će pasti ako pronađe kritične dizajnerske propuste

      # 3. Korak: Pokretanje Maven provjere (SCA, Enforcer i Unit/Integration testovi)
      # [AŽURIRANO ZA A06]: Pokretanje testova koji provjeravaju poslovnu logiku i stanja grešaka (Misuse-cases)
      - name: Pokretanje sigurnosnih skenera, testova dizajna i izgradnja
        run: mvn clean verify

      # 4. Korak: Pohrana generiranog SBOM-a
      - name: Pohrana CycloneDX SBOM dokumenta
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: software-bill-of-materials
          path: target/bom.json
          retention-days: 30

      # 5. Korak: Izgradnja Docker slike
      - name: Izgradnja Docker slike
        run: |
          docker build -t owasp-demo:latest .