name: OWASP Secure CI Pipeline

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  secure-build:
    name: Izgradnja projekta i SCA Skeniranje (OWASP A03)
    runs-on: ubuntu-latest

    steps:
      # 1. Korak: Preuzimanje izvornog koda iz repozitorija
      - name: Preuzimanje koda
        uses: actions/checkout@v4

      # 2. Korak: Postavljanje Java 21 okruženja (JDK) potrebnog za prevođenje koda
      - name: Postavljanje Jave 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Automatski kešira ovisnosti kako bi se ubrzao build i smanjio rizik od tamperinga

      # 3. Korak: Pokretanje Maven provjere
      # Ova naredba aktivira ugrađene plugine iz pom.xml:
      # - maven-enforcer-plugin (Provjera pravila i zabrana SNAPSHOT ovisnosti)
      # - dependency-check-maven (Skeniranje tranzitivnih ovisnosti protiv NVD/CVE baze)
      # - cyclonedx-maven-plugin (Središnje generiranje agregiranog SBOM-a u JSON formatu)
      - name: Pokretanje sigurnosnih skenera i izgradnja (Maven Verify)
        run: mvn clean verify

      # 4. Korak: Pohrana generiranog SBOM-a (Software Bill of Materials) kao artefakta cjevovoda
      # Time se ispunjava OWASP A03 preporuka o trajnom čuvanju i reviziji SBOM-a za svaku verziju
      - name: Pohrana CycloneDX SBOM dokumenta
        if: always() # Osigurava da se SBOM spremi čak i ako naknadni koraci padnu
        uses: actions/upload-artifact@v4
        with:
          name: software-bill-of-materials
          path: target/bom.json
          retention-days: 30

      # 5. Korak: Izgradnja Docker slike (Pokretanje očvrsnutog Dockerfile-a)
      # Ovaj korak potvrđuje da se aplikacija uspješno pakira u minimalnu Alpine JRE okolinu s ne-root korisnikom
      - name: Izgradnja Docker slike
        run: |
          docker build -t owasp-demo:latest .